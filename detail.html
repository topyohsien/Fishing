<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平海象 - API 調試模式</title>
    <style>
        body { background: #0a192f; color: #e6f1ff; font-family: monospace; padding: 20px; }
        .debug-box { background: #172a45; border: 1px solid #64ffda; padding: 15px; border-radius: 8px; overflow: auto; max-height: 80vh; }
        .status { margin-bottom: 10px; font-weight: bold; }
        .success { color: #64ffda; }
        .error { color: #ff6b6b; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; }
    </style>
</head>
<body>
    <h3>🔍 API 真實資料抓取診斷</h3>
    <div id="debug-status" class="status">正在請求資料...</div>
    <div class="debug-box">
        <pre id="raw-output">等待回應中...</pre>
    </div>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const API_URL = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`;

        async function debugAPI() {
            const statusEl = document.getElementById('debug-status');
            const outputEl = document.getElementById('raw-output');

            try {
                const res = await fetch(API_URL);
                
                if (!res.ok) {
                    statusEl.innerHTML = `<span class="error">❌ HTTP 錯誤: ${res.status}</span>`;
                    outputEl.innerText = `可能原因：API Key 無效或請求次數過多。\n回應內容：${await res.text()}`;
                    return;
                }

                const data = await res.json();
                statusEl.innerHTML = `<span class="success">✅ 成功抓取 JSON！</span>`;
                
                // 檢查 records 是否存在
                if (!data.records) {
                    outputEl.innerText = "警告：回傳資料中沒有 records 欄位！\n\n完整內容：\n" + JSON.stringify(data, null, 2);
                    return;
                }

                // 為了縮短長度，我們抓前兩個 location 來看結構就好
                const snapshot = {
                    "資料層級偵測": Object.keys(data.records),
                    "第一筆資料結構摘要": data.records.tideForecasts?.location?.[0] || data.records.Location?.[0] || "找不到 Location 陣列",
                    "原始資料前2000字": JSON.stringify(data, null, 2).substring(0, 5000)
                };

                outputEl.innerText = JSON.stringify(snapshot, null, 2);

            } catch (err) {
                statusEl.innerHTML = `<span class="error">❌ 網路或系統錯誤</span>`;
                outputEl.innerText = `錯誤訊息: ${err.message}\n\n若是看到 'Failed to fetch'，代表可能是 GitHub Pages 的 CORS 限制，或是您的 API Key 尚未開通。`;
            }
        }

        debugAPI();
    </script>
</body>
</html>
