<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平海象與咬況預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 20px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; font-weight: bold; }
        canvas { max-height: 200px; width: 100% !important; }
    </style>
</head>
<body>
    <div style="margin-bottom:15px;"><a href="javascript:location.reload()" style="color:var(--highlight); text-decoration:none; font-weight:bold;">🔄 刷新數據</a></div>
    
    <div class="card">
        <div id="status-title" class="highlight" style="font-size:1.1rem;">📍 數據搜尋中...</div>
        <div id="bite-hint" style="margin-top:10px; font-size:0.9rem;">咬況預估：<span class="highlight">正在匹配測站...</span></div>
    </div>

    <div class="card"><canvas id="tideChart"></canvas></div>

    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>類型</th><th>路亞熱點</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const today = new Date().toLocaleDateString('en-CA'); 

        async function fetchTide() {
            try {
                const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await res.json();
                
                // 1. 取得所有地點 (考慮不同 API 版本)
                let locations = data.records?.tideForecasts?.location || data.records?.Location || data.records?.location || [];
                let targetStation = null;

                // 2. 深度遍歷搜尋「安平」
                for (let loc of locations) {
                    // 如果這層就是安平
                    if (loc.stationName?.includes("安平") || loc.LocationName?.includes("安平")) {
                        targetStation = loc;
                        break;
                    }
                    // 如果安平藏在 Station 陣列裡 (台南市 -> 安平)
                    if (loc.Station) {
                        const s = loc.Station.find(st => st.StationName?.includes("安平") || st.stationName?.includes("安平"));
                        if (s) {
                            targetStation = s;
                            break;
                        }
                    }
                }

                if (!targetStation) throw new Error("測站列表匹配失敗，請檢查 API 權限");

                // 3. 取得預報資料
                const forecast = targetStation.tideForecast || targetStation.TideForecast;
                const periods = forecast?.tidePeriod || forecast?.TimePeriods;

                if (!periods) throw new Error("找到測站但無預報內容");

                // 4. 過濾今日數據
                const daily = periods.filter(p => {
                    const t = p.tideTime || p.DateTime;
                    return t && t.startsWith(today);
                });

                if (daily.length === 0) throw new Error("今日無預報資料");

                // 5. 計算潮差
                const hArr = daily.map(d => parseInt(d.tideHeight || d.TideHeight || 0));
                const diff = Math.max(...hArr) - Math.min(...hArr);
                
                document.getElementById('status-title').innerText = `📍 安平測站 - 今日潮差 ${diff}cm`;
                document.getElementById('bite-hint').innerHTML = diff > 100 ? "咬況預估：<span class='highlight'>🔥 大潮活躍 (Jigging)</span>" : "咬況預估：<span>🎣 穩定普通</span>";

                render(daily);
            } catch (err) {
                console.error(err);
                document.getElementById('tide-table').innerHTML = `<tr><td colspan="4" style="color:#ff6b6b; padding:20px;">❌ 載入失敗<br><small>${err.message}</small></td></tr>`;
            }
        }

        function render(list) {
            const labels = list.map(d => (d.tideTime || d.DateTime).split(/[ T]/)[1].substring(0, 5));
            const heights = list.map(d => (d.tideHeight || d.TideHeight));

            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(document.getElementById('tideChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '潮高',
                        data: heights,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: {color: '#233554'}, ticks: {color: '#8892b0'} }, 
                        x: { ticks: {color: '#8892b0'} } 
                    }
                }
            });

            document.getElementById('tide-table').innerHTML = list.map(d => {
                const fullTime = d.tideTime || d.DateTime;
                const time = fullTime.split(/[ T]/)[1].substring(0, 5);
                const hour = parseInt(time.split(':')[0]);
                const isGolden = (hour >= 5 && hour <= 7) || (hour >= 17 && hour <= 19);
                return `<tr class="${isGolden ? 'hot' : ''}">
                    <td>${time}</td>
                    <td>${d.tideHeight || d.TideHeight}cm</td>
                    <td>${d.tideType || d.TideType || '一般'}</td>
                    <td>${isGolden ? '🔥 黃金母光' : '-'}</td>
                </tr>`;
            }).join('');
        }
        fetchTide();
    </script>
</body>
</html>
