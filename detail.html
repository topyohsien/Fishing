<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路亞岸拋詳細預報 - 安平</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .back-btn { color: var(--highlight); text-decoration: none; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .controls { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #233554; }
        .loc-info { font-size: 1.1rem; margin-bottom: 5px; color: #ff6b6b; font-weight: bold; }
        input[type="date"] { 
            width: 100%; padding: 10px; border-radius: 8px; background: #233554; 
            color: var(--highlight); border: 1px solid var(--highlight); font-size: 1rem; box-sizing: border-box; margin-top: 10px;
        }
        .lure-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 0.9rem; }
        .stat-box { background: rgba(100, 255, 218, 0.05); padding: 8px; border-radius: 6px; border: 1px solid #233554; }
        .stat-label { color: #8892b0; display: block; font-size: 0.75rem; }
        .stat-val { color: var(--highlight); font-weight: bold; }
        .chart-container { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #233554; }
        .fish-icons { font-size: 1.3rem; color: var(--highlight); margin-bottom: 5px; text-align: right; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #233554; font-size: 13px; }
        th { background: #1d3557; color: var(--highlight); }
        .hot-time { background: rgba(255, 107, 107, 0.1); color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>
    <a href="map.html" class="back-btn">← 返回地圖</a>
    <div class="controls">
        <div id="location-name" class="loc-info">📍 正在讀取安平資料...</div>
        <input type="date" id="date-picker">
        <div class="lure-stats">
            <div class="stat-box"><span class="stat-label">母光時刻</span><span id="sunrise-val" class="stat-val">05:36</span></div>
            <div class="stat-box"><span class="stat-label">黃昏時刻</span><span id="sunset-val" class="stat-val">18:21</span></div>
            <div class="stat-box"><span class="stat-label">當日潮差</span><span id="tide-diff" class="stat-val">--</span> cm</div>
            <div class="stat-box"><span class="stat-label">流速預估</span><span id="current-speed" class="stat-val">--</span></div>
        </div>
    </div>
    <div class="chart-container">
        <div class="fish-icons" id="fish-rank">🐟🐟🐟</div>
        <div style="font-size:0.9rem; margin-bottom:10px;">🎣 安平路亞活躍預測 (Jigging)</div>
        <canvas id="lureChart"></canvas>
    </div>
    <table>
        <thead><tr><th>時間</th><th>潮位</th><th>活躍度</th></tr></thead>
        <tbody id="data-table"><tr><td colspan="3">⏳ 正在連線氣象署...</td></tr></tbody>
    </table>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const datePicker = document.getElementById('date-picker');
        let myChart = null;

        // 設定初始日期
        datePicker.value = new Date().toISOString().split('T')[0];

        async function fetchLureData() {
            try {
                // 1. 抓取潮汐預報
                const response = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await response.json();
                
                // 2. 修正：精確定位「臺南市 -> 安平」測站
                const tainan = data.records.Location.find(l => l.LocationName === "臺南市");
                const anping = tainan.Station.find(s => s.StationName === "安平");
                
                // 3. 過濾所選日期的潮汐時段
                const dailyTide = anping.TideForecast.TimePeriods.filter(t => t.DateTime.startsWith(datePicker.value));

                if (dailyTide.length === 0) {
                    document.getElementById('data-table').innerHTML = '<tr><td colspan="3">❌ 此
