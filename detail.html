<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平海象與咬況預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 20px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; font-weight: bold; }
        canvas { max-height: 200px; width: 100% !important; }
    </style>
</head>
<body>
    <div style="margin-bottom:15px;"><a href="javascript:location.reload()" style="color:var(--highlight); text-decoration:none; font-weight:bold;">🔄 刷新數據</a></div>
    
    <div class="card">
        <div id="status-title" class="highlight" style="font-size:1.1rem;">📍 數據載入中...</div>
        <div id="bite-hint" style="margin-top:10px; font-size:0.9rem;">咬況預估：<span class="highlight">分析中...</span></div>
    </div>

    <div class="card"><canvas id="tideChart"></canvas></div>

    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>類型</th><th>路亞熱點</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const today = new Date().toLocaleDateString('en-CA'); // 取得 YYYY-MM-DD

        async function fetchTide() {
            try {
                const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await res.json();
                
                // --- 暴力搜尋邏輯：直接找出含有安平的物件 ---
                let allLocations = [];
                if (data.records.tideForecasts) allLocations = data.records.tideForecasts.location;
                else if (data.records.Location) allLocations = data.records.Location;
                else if (data.records.location) allLocations = data.records.location;

                const anping = allLocations.find(l => 
                    (l.stationName && l.stationName.includes("安平")) || 
                    (l.LocationName && l.LocationName.includes("臺南"))
                );

                if (!anping) throw new Error("找不到安平測站，請檢查 API 回傳內容");

                // 取得潮汐資料數組
                const forecast = anping.tideForecast || anping.TideForecast;
                const periods = forecast.tidePeriod || forecast.TimePeriods;

                // 篩選今日
                const daily = periods.filter(p => {
                    const t = p.tideTime || p.DateTime;
                    return t.startsWith(today);
                });

                if (daily.length === 0) throw new Error("今日無預報，請確認 API 日期範圍");

                // 渲染 UI
                const hArr = daily.map(d => parseInt(d.tideHeight || d.TideHeight));
                const diff = Math.max(...hArr) - Math.min(...hArr);
                
                document.getElementById('status-title').innerText = `📍 安平港 - 今日潮差 ${diff}cm`;
                document.getElementById('bite-hint').innerHTML = diff > 100 ? "咬況預估：<span class='highlight'>🔥 大潮活躍</span>" : "咬況預估：<span>🎣 穩定普通</span>";

                render(daily);
            } catch (err) {
                document.getElementById('tide-table').innerHTML = `<tr><td colspan="4" style="color:#ff6b6b; padding:20px;">❌ 載入失敗<br><small>${err.message}</small></td></tr>`;
            }
        }

        function render(list) {
            const labels = list.map(d => (d.tideTime || d.DateTime).split(/[ T]/)[1].substring(0, 5));
            const heights = list.map(d => (d.tideHeight || d.TideHeight));

            new Chart(document.getElementById('tideChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '潮高',
                        data: heights,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: {color: '#233554'}, ticks: {color: '#8892b0'} }, x: { ticks: {color: '#8892b0'} } }
                }
            });

            document.getElementById('tide-table').innerHTML = list.map(d => {
                const time = (d.tideTime || d.DateTime).split(/[ T]/)[1].substring(0, 5);
                const hour = parseInt(time.split(':')[0]);
                const isGolden = (hour >= 5 && hour <= 7) || (hour >= 17 && hour <= 19);
                return `<tr class="${isGolden ? 'hot' : ''}">
                    <td>${time}</td>
                    <td>${d.tideHeight || d.TideHeight}cm</td>
                    <td>${d.tideType || d.TideType}</td>
                    <td>${isGolden ? '🔥 黃金時段' : '-'}</td>
                </tr>`;
            }).join('');
        }
        fetchTide();
    </script>
</body>
</html>
