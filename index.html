<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平釣魚即時海象</title>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --text: #64ffda; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #233554; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; }
        .label { font-size: 0.8rem; color: #8892b0; margin-bottom: 5px; }
        .value { font-size: 1.4rem; font-weight: bold; color: var(--text); }
        #status { text-align: center; font-size: 0.7rem; color: #8892b0; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">🎣 安平觀測站即時海象</h2>
        <div id="status">正在同步氣象署數據...</div>
    </div>
    <div class="grid">
        <div class="card"><div class="label">氣溫</div><div id="temp" class="value">--</div></div>
        <div class="card"><div class="label">風速 (m/s)</div><div id="wind" class="value">--</div></div>
        <div class="card"><div class="label">風向</div><div id="dir" class="value">--</div></div>
        <div class="card"><div class="label">日累積雨量</div><div id="rain" class="value">--</div></div>
    </div>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';

        async function fetchAnping() {
            const statusEl = document.getElementById('status');
            try {
                // 鎖定安平觀測站 C0X090
                const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0003-001?Authorization=${API_KEY}&StationId=C0X090`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                // 確保 API 回傳成功且有資料
                if (data.success === "true" && data.records.Station.length > 0) {
                    const station = data.records.Station[0];
                    const weather = station.WeatherElement;

                    // 1. 氣溫 (AirTemperature)
                    document.getElementById('temp').innerText = (weather.AirTemperature || '--') + '°C';
                    
                    // 2. 風速 (WindSpeed)
                    document.getElementById('wind').innerText = (weather.WindSpeed || '--') + ' m/s';
                    
                    // 3. 風向 (WindDirection)
                    document.getElementById('dir').innerText = (weather.WindDirection || '--') + '°';
                    
                    // 4. 雨量 (位於 Now -> Precipitation)
                    const rainVal = weather.Now ? weather.Now.Precipitation : '0.0';
                    document.getElementById('rain').innerText = rainVal + ' mm';
                    
                    // 更新時間顯示
                    const obsTime = station.ObsTime.DateTime.split('T')[1].substring(0, 5);
                    statusEl.innerText = '最後更新：' + obsTime;
                    statusEl.style.color = '#64ffda';
                } else {
                    statusEl.innerText = '測站維護中或 API 資料更新中';
                }
            } catch (err) {
                statusEl.innerText = '資料路徑載入中，請重新整理頁面';
                console.error('Fetch Error:', err);
            }
        }

        // 啟動抓取
        fetchAnping();
        
        // 每 5 分鐘自動刷新一次數據
        setInterval(fetchAnping, 300000);
    </script>
</body>
</html>
