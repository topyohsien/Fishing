<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安平釣點地圖工具</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 100%; width: 100%; }
        .instruction {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(23, 42, 69, 0.9);
            color: var(--highlight); padding: 8px 20px; border-radius: 25px;
            border: 1px solid var(--highlight); font-size: 14px; pointer-events: none; white-space: nowrap;
        }
        .leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border-radius: 12px; border: 1px solid #233554; padding: 5px; }
        .leaflet-popup-tip { background: var(--card); }
        .info-title { color: #ff6b6b; font-weight: bold; border-bottom: 1px solid #233554; margin-bottom: 8px; font-size: 1.1rem; padding-bottom: 5px; }
        .info-row { margin: 8px 0; font-size: 14px; line-height: 1.5; }
        .val { color: var(--highlight); font-weight: bold; }
        .detail-btn {
            display: block; text-align: center; background: #233554; color: var(--highlight);
            text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 10px;
            font-weight: bold; border: 1px solid var(--highlight); transition: 0.3s;
        }
        .detail-btn:active { background: var(--highlight); color: var(--bg); }
    </style>
</head>
<body>

    <div id="map"></div>
