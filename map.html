<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平釣點地圖工具</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0a192f; --card: #172a45; --text: #64ffda; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; }
        #map { height: 100%; width: 100%; }
        .popup-card { color: #0a192f; min-width: 180px; }
        .popup-card b { color: #d11141; }
        .info-box { font-size: 0.9rem; line-height: 1.6; }
        #instructions { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(23, 42, 69, 0.9); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--text); font-size: 0.8rem; pointer-events: none; }
    </style>
</head>
<body>

    <div id="instructions">📍 長按地圖任意位置查看海象</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';

const map = L.map('map').setView([22.992, 120.150], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('contextmenu', function(e) {
    const lat = e.latlng.lat.toFixed(4);
    const lng = e.latlng.lng.toFixed(4);
    fetchSeaData(lat, lng, e.latlng);
});

async function fetchSeaData(lat, lng, latlng) {
    let infoHtml = `<div class="popup-card">
        <div class="info-box">
            <b style="color:#ff4444">GPS: ${lat}, ${lng}</b><br><hr style="border:0;border-top:1px solid #eee">
            <span id="sun-data">🌅 日出日落讀取中...</span><br>
            <span id="tide-data">🌊 潮汐狀態讀取中...</span>
        </div>
    </div>`;

    const popup = L.popup().setLatLng(latlng).setContent(infoHtml).openOn(map);

    // 1. 日出日落
    try {
        const sunRes = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
        const sunData = await sunRes.json();
        const sunrise = new Date(sunData.results.sunrise).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'});
        const sunset = new Date(sunData.results.sunset).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('sun-data').innerHTML = `🌅 日出: ${sunrise} | 日落: ${sunset}`;
    } catch (err) { document.getElementById('sun-data').innerText = "日出抓取失敗"; }

    // 2. 潮汐 (路徑強化版)
    try {
        const tideUrl = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}&locationName=${encodeURIComponent('臺南市')}`;
        const tideRes = await fetch(tideUrl);
        const tideData = await tideRes.json();
        
        // 自動尋找站點資料
        const location = tideData.records.Location[0];
        const station = location.Station || location.Station[0]; 
        const now = new Date();
        
        // 抓取預報時間段
        const timePeriods = station.TideForecast.TimePeriods;
        const nextEvent = timePeriods.find(t => new Date(t.DateTime) > now);

        if (nextEvent) {
            const tTime = nextEvent.DateTime.split('T')[1].substring(0, 5);
            const tType = nextEvent.TideType;
            const tHeight = nextEvent.TideHeight || '--';
            document.getElementById('tide-data').innerHTML = `🌊 下次: <b>${tType}</b> (${tTime}) ${tHeight}cm`;
        } else {
            document.getElementById('tide-data').innerText = "近期無潮汐預報資料";
        }
    } catch (err) {
        console.error(err);
        document.getElementById('tide-data').innerText = "🌊 潮汐 API 格式解析中..."; 
        // 備援方案：如果台南市沒資料，提示檢查氣象署官網 Key 權限
    }
}
        
    </script>
</body>
</html>
