<script>
    // ... 前段代碼保持不變 ...
    // 3. 潮汐精確讀取 (F-A0021-001)
    fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
            try {
                // 強度解析：遍歷所有地點尋找「臺南」與「安平」
                const locations = data.records.Location;
                let anpingStation = null;
                
                for (let loc of locations) {
                    if (loc.LocationName.includes("臺南")) {
                        anpingStation = loc.Station.find(s => s.StationName.includes("安平"));
                        if (anpingStation) break;
                    }
                }

                if (anpingStation && anpingStation.TideForecast && anpingStation.TideForecast.TimePeriods) {
                    const now = new Date();
                    const nextTide = anpingStation.TideForecast.TimePeriods.find(t => new Date(t.DateTime) > now);
                    
                    if (nextTide) {
                        const timeStr = nextTide.DateTime.split('T')[1].substring(0, 5);
                        document.getElementById('tide-box').innerHTML = `🌊 下次 <span class="val">${nextTide.TideType}</span>：${timeStr}`;
                    } else {
                        document.getElementById('tide-box').innerHTML = "🌊 今日預報已結束";
                    }
                } else {
                    throw new Error("找不到測站資料");
                }
            } catch (err) {
                console.error("解析錯誤:", err);
                document.getElementById('tide-box').innerHTML = "⚠️ 測站資料解析中...";
            }
        }).catch(() => {
            document.getElementById('tide-box').innerHTML = "❌ 潮汐連線失敗";
        });
</script>
