<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安平釣點地圖工具</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .instruction {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(23, 42, 69, 0.9);
            color: var(--highlight); padding: 8px 20px; border-radius: 25px;
            border: 1px solid var(--highlight); font-size: 14px; pointer-events: none;
        }
        .leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border-radius: 12px; border: 1px solid #233554; }
        .leaflet-popup-tip { background: var(--card); }
        .info-title { color: #ff6b6b; font-weight: bold; border-bottom: 1px solid #233554; margin-bottom: 8px; font-size: 1.1rem; }
        .info-row { margin: 8px 0; font-size: 14px; line-height: 1.5; }
        .val { color: var(--highlight); font-weight: bold; }
    </style>
</head>
<body>

    <div class="instruction">📍 長按地圖查看精確海象預報</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 請確保此 Key 已訂閱 F-A0021-001
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';

        const map = L.map('map', { center: [22.991, 120.146], zoom: 14, zoomControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('contextmenu', function(e) {
            const { lat, lng } = e.latlng;
            fetchData(lat.toFixed(5), lng.toFixed(5), e.latlng);
        });

        async function fetchData(lat, lng, latlng) {
            const popupHtml = `
                <div class="info-title">GPS: ${lat}, ${lng}</div>
                <div id="sun-box" class="info-row">🌅 日出日落讀取中...</div>
                <div id="weather-box" class="info-row">📡 即時氣象讀取中...</div>
                <div id="tide-box" class="info-row">🌊 潮汐預報讀取中...</div>
            `;
            const popup = L.popup().setLatLng(latlng).setContent(popupHtml).openOn(map);

            // 1. 日出日落
            fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`)
                .then(res => res.json())
                .then(sunData => {
                    const sunrise = new Date(sunData.results.sunrise).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'});
                    const sunset = new Date(sunData.results.sunset).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'});
                    document.getElementById('sun-box').innerHTML = `🌅 日出 <span class="val">${sunrise}</span> | 日落 <span class="val">${sunset}</span>`;
                });

            // 2. 安平測站即時氣象
            fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0003-001?Authorization=${API_KEY}&stationId=C0X090`)
                .then(res => res.json())
                .then(data => {
                    const w = data.records.Station[0].WeatherElement;
                    document.getElementById('weather-box').innerHTML = `📡 風速 <span class="val">${w.WindSpeed} m/s</span> | 氣溫 <span class="val">${w.AirTemperature}°C</span>`;
                }).catch(() => { document.getElementById('weather-box').innerText = "📡 觀測站資料連線異常"; });

            // 3. 潮汐預報 (未來1個月資料集解析)
            fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`)
                .then(res => res.json())
                .then(data => {
                    const tainan = data.records.Location.find(loc => loc.LocationName === "臺南市");
                    const anping = tainan.Station.find(st => st.StationName === "安平") || tainan.Station[0];
                    const now = new Date();
                    const nextTide = anping.TideForecast.TimePeriods.find(t => new Date(t.DateTime) > now);
                    
                    if (nextTide) {
                        const tTime = nextTide.DateTime.split('T')[1].substring(0, 5);
                        document.getElementById('tide-box').innerHTML = `🌊 下次 <span class="val">${nextTide.TideType}</span>：${tTime} (${nextTide.TideHeight || '--'}cm)`;
                    }
                })
                .catch(() => {
                    document.getElementById('tide-box').innerHTML = `<span style="color:#ffbb33">⚠️ 請確認訂閱 F-A0021-001</span>`;
                });
        }
    </script>
</body>
</html>
