<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠島台東·全能導覽手冊</title>
    <style>
        :root { --main: #0077b6; --bg: #f4f7f6; --accent: #ff6b6b; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .day-title { font-size: 1.1rem; color: var(--main); font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .section-label { font-size: 0.85rem; color: #666; font-weight: bold; margin-top: 10px; display: block; }
        .item-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .btn { 
            background: white; border: 1px solid var(--main); color: var(--main); 
            padding: 6px 12px; border-radius: 20px; font-size: 13px; text-decoration: none;
            display: inline-block; transition: 0.2s;
        }
        .btn:active { background: var(--main); color: white; }
        .weather-tag { background: #caf0f8; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; width: fit-content; }
        .alert { color: var(--accent); font-weight: bold; font-size: 12px; margin-top: 5px; }
    </style>
</head>
